services:
  - type: web
    name: bitebite
    env: php
    buildCommand: |
      composer install --no-dev
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_NAME
        value: "Bite Bite"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: true
      - key: APP_URL
        generateValue: true
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: bitebite-db
          property: host
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        fromDatabase:
          name: bitebite-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: bitebite-db
          property: username
      - key: DB_PASSWORD
        fromDatabase:
          name: bitebite-db
          property: password
      - key: SITE_NAME
        value: "Bite Bite"
      - key: SITE_EMAIL
        value: "info@bitebite.com"
      - key: SITE_PHONE
        value: "7061296558"
      - key: SITE_ADDRESS
        value: "Noida, India"

databases:
  - name: bitebite-db
    databaseName: bitebite
    user: bitebite
    plan: free
